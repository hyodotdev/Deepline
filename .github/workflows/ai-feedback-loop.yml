name: AI Feedback Loop
on:
  workflow_run:
    workflows: ["Server CI", "Shared Module CI", "Android CI", "iOS CI"]
    types: [completed]

jobs:
  analyze-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Check for existing issue
        id: check-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if an open issue already exists for this workflow + branch
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          WORKFLOW="${{ github.event.workflow_run.name }}"
          EXISTING=$(gh issue list --state open --label ai-fix --search "in:title [AI-FIX] CI Failure: $WORKFLOW" --json number,title --jq ".[0].number // empty")
          if [ -n "$EXISTING" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Found existing issue #$EXISTING, skipping duplicate creation"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create failure report
        if: steps.check-issue.outputs.skip == 'false'
        run: |
          cat > failure-report.md << 'EOF'
          ## CI Failure Report

          **Workflow**: ${{ github.event.workflow_run.name }}
          **Run**: ${{ github.event.workflow_run.html_url }}
          **Branch**: ${{ github.event.workflow_run.head_branch }}
          **Commit**: ${{ github.event.workflow_run.head_sha }}

          ### Next Steps for Claude

          1. Read the workflow run logs at the URL above
          2. Identify the failing test(s) or build error
          3. Read the relevant source files
          4. Analyze the root cause
          5. Create a fix
          6. Open a PR with label `ai-generated-fix`

          ### Failure Details

          See the workflow run URL above for full logs and error details.
          EOF

      - name: Create issue for Claude
        if: steps.check-issue.outputs.skip == 'false'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[AI-FIX] CI Failure: ${{ github.event.workflow_run.name }}"
          content-filepath: failure-report.md
          labels: ai-fix,ci-failure,automated
