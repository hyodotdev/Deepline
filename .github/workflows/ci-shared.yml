name: Shared Module CI
on:
  push:
    paths: ['shared/**']
  pull_request:
    paths: ['shared/**']

jobs:
  test-jvm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM tests
        run: ./gradlew :shared:serverTest --info

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-jvm-test-results
          path: shared/build/reports/tests/

  test-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android unit tests
        run: ./gradlew :shared:testDebugUnitTest --info

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-android-test-results
          path: shared/build/reports/tests/

  test-ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run iOS simulator tests
        run: ./gradlew :shared:iosSimulatorArm64Test --info

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-ios-test-results
          path: shared/build/reports/tests/
