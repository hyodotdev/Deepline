name: Android CI
on:
  push:
    paths: ['clients/android/**', 'shared/**']
  pull_request:
    paths: ['clients/android/**', 'shared/**']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :clients:android:app:assembleDebug

      - name: Run unit tests
        run: ./gradlew :clients:android:app:testDebugUnitTest --info

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: clients/android/app/build/outputs/apk/debug/*.apk

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-test-results
          path: clients/android/app/build/reports/tests/
