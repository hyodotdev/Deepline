services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: deepline
      POSTGRES_USER: deepline
      POSTGRES_PASSWORD: change-me
    ports:
      - "5432:5432"
    volumes:
      - deepline-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - deepline-redis:/data

volumes:
  deepline-postgres:
  deepline-redis:
